<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Helpdesk 365 Demo</title>

<style>
body{
    margin:0;
    padding:0;
    background:#f5f7fb;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.demo-video-box{
    width:900px;
    max-width:95%;
    background:#fff;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 10px 35px rgba(0,0,0,0.12);
}

.video-thumbnail{
    position:relative;
    width:100%;
    height:600px;
    overflow:hidden;
}

.video-thumbnail img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

.play-button{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:95px;
    height:95px;
    border-radius:50%;
    background:red;
    display:flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    transition:0.3s ease;
}

.play-button:hover{
    transform:translate(-50%,-50%) scale(1.08);
}

.play-button:before{
    content:'';
    border-left:30px solid #fff;
    border-top:18px solid transparent;
    border-bottom:18px solid transparent;
    margin-left:6px;
}

.video-content{
    padding:25px;
    text-align:center;
}

.video-content h2{
    margin:0 0 12px;
    font-size:32px;
    color:#111827;
}

.video-content p{
    margin:0;
    font-size:18px;
    color:#4b5563;
    line-height:1.6;
}
</style>
</head>

<body>

<div class="demo-video-box">

    <div class="video-thumbnail">

        <img src="https://img.youtube.com/vi/eW-cWppHs_Y/maxresdefault.jpg" alt="Helpdesk 365 Demo">

        <a 
           class="play-button"
           href="https://www.youtube.com/watch?v=eW-cWppHs_Y"
           target="_blank">
        </a>

    </div>

    <div class="video-content">
        <h2>Helpdesk 365 Product Demo</h2>
        <p>
            Watch the complete Helpdesk 365 walkthrough and product demonstration.
        </p>
    </div>

</div>

</body>
</html>
